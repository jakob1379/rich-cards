[project]
name = "rich-cards"
version = "0.1.0"
description = "Render syntax-highlighted code cards on polished gradient SVG backgrounds."
readme = "README.md"
authors = [
    { name = "Jakob Stender Guldberg", email = "jakob1379@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "typer>=0.26.7",
]

[project.scripts]
rich-cards = "rich_cards.cli:app"

[build-system]
requires = ["uv_build>=0.11.17,<0.12.0"]
build-backend = "uv_build"
